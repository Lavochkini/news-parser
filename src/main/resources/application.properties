spring.application.name=news-parser
logging.level.com.lake_team.fistserios=INFO
logging.level.com.lake_team.fistserios.analysis=DEBUG

# Прибираємо спам від HTTP-клієнтів (Reddit HTML, зовнішні API)
logging.level.org.springframework.web.client=WARN
logging.level.org.springframework.web.servlet=WARN
logging.level.org.springframework.http=WARN
logging.level.org.apache.http=WARN
logging.level.org.apache.http.wire=OFF
logging.level.reactor.netty=WARN
spring.profiles.active=local
server.port=8080

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/news_parser

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

server.error.include-message=always
server.error.include-stacktrace=always

# JWT
# Секрет — Base64 рядок мінімум 32 байти (256 біт) для алгоритму HS256.
# Реальний секрет зберігається в application-local.properties (gitignored).
jwt.secret=YOUR_BASE64_SECRET_MIN_32_BYTES
# Строк дії токена в мілісекундах: 86400000 = 24 години
jwt.expiration=86400000

# NewsAPI (https://newsapi.org)
news_api.key=YOUR_NEWSAPI_KEY
news_api.url=https://newsapi.org/v2/top-headlines

# The Guardian (https://open-platform.theguardian.com)
guardian.api.key=YOUR_GUARDIAN_KEY
guardian.api.url=https://content.guardianapis.com/search

# GNews (https://gnews.io)
gnews.api.key=YOUR_GNEWS_KEY
gnews.api.url=https://gnews.io/api/v4/top-headlines

# ClaimBuster API — optional, free registration at idir.uta.edu/ClaimBuster
# Якщо порожньо — використовується без ключа (обмежена кількість запитів)
claimBuster.api.key=
