<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Main Page</title>
    <link rel="stylesheet" th:href="@{/css/main.css}" />
</head>
<body style="background-color: #1e1e1e; color: white;">

<div class="container">

    <!-- Верхній блок пошуку -->
    <div class="top-bar">
        <input type="text" id="mainSearch" placeholder="Search..." class="search-field">
        <button id="settingsButton" class="settings-btn">⚙</button>
    </div>

    <!-- Лінки -->
    <div class="links">
        <a th:href="@{/login}" class="link-blue">Login</a>
        <a th:href="@{/register}" class="link-green">Registration</a>
    </div>

    <!-- Основний Grid із 4 блоками -->
    <div class="grid">
        <div class="card">F1</div>
        <div class="card">F2</div>
        <div class="card">F3</div>
        <div class="card">F4</div>
    </div>

    <!-- Праве меню -->
    <div id="settingsMenu" class="settings-panel hidden">
        <h3>⚙ Settings</h3>
        <p>Here will be your options</p>
    </div>

</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
