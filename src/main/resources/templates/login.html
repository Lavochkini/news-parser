<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Fistserios — Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>

<div class="auth-wrapper">

    <div class="auth-image">
        <img th:src="@{/images/leftImage.png}" alt="" />
    </div>

    <div class="auth-card">
        <div class="auth-logo">Fistserios</div>
        <div class="auth-subtitle">Sign in to your account</div>

        <div id="globalError" class="auth-error"></div>

        <form id="loginForm" novalidate>

            <div class="field">
                <label class="field__label" for="email">E-mail</label>
                <div class="field__wrap">
                    <input class="field__input" id="email"
                           type="text" name="email" placeholder="you@example.com" autocomplete="email" />
                </div>
                <div class="field__hint field__hint--error" id="emailError"></div>
            </div>

            <div class="field">
                <label class="field__label" for="password">Password</label>
                <div class="field__wrap">
                    <input class="field__input" id="password"
                           type="password" name="password" placeholder="Your password" autocomplete="current-password" />
                    <button type="button" class="field__toggle" id="togglePassword">Show</button>
                </div>
                <div class="field__hint field__hint--error" id="passwordError"></div>
            </div>

            <button type="submit" class="auth-btn">Sign in</button>

        </form>

        <div class="auth-links">
            <a th:href="@{/register}" class="link-primary">Create an account</a>
            <a th:href="@{/main}"     class="link-guest">Continue as guest</a>
        </div>
    </div>

    <div class="auth-image">
        <img th:src="@{/images/rightImage.png}" alt="" />
    </div>

</div>

<script th:src="@{/js/auth.js}"></script>
<script th:src="@{/js/login.js}"></script>
</body>
</html>
